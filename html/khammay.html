<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nghệ Thuật Khảm Trai & Mây Tre | Vòng Tròn Xanh</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/setquatang.css">
    <link rel="stylesheet" href="../css/global.css">
    <style>
        :root {
            --primary-green: #1b5e20;
            --accent-gold: #c5a059;
            --bg-light: #f4f7f4;
            --text-dark: #2c3e50;
            --font-main: 'Be Vietnam Pro', sans-serif;
            --font-heading: 'Playfair Display', serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--white);
            text-align: center;
            padding: 4rem 1rem;
            border-bottom: 3px solid var(--primary-green);
        }

        header h1 {
            font-family: var(--font-heading);
            font-size: 3rem;
            color: var(--primary-green);
            margin: 0;
        }

        header p {
            font-style: italic;
            color: var(--accent-gold);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .gallery-container {
            max-width: 1300px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        /* Lưới hiển thị 69 hình ảnh */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background: #ddd;
            aspect-ratio: 1 / 1; /* Giữ ảnh dạng vuông đồng nhất */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            z-index: 10;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        /* Hiệu ứng mờ khi hover */
        .gallery-item:hover img {
            filter: brightness(0.8);
        }

        /* --- LIGHTBOX (Cửa sổ hiện ảnh rõ) --- */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            border: 4px solid var(--white);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .lightbox-caption {
            position: absolute;
            bottom: 30px;
            color: var(--accent-gold);
            font-family: var(--font-heading);
            font-size: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <header>
        <h1>Tinh Hoa Khảm Trai & Mây Tre</h1>
        <p>Gìn giữ nét đẹp thủ công truyền thống Việt Nam</p>
    </header>

    <div class="gallery-container">
        <div class="gallery-grid" id="gallery">
            <div class="gallery-item" onclick="openLightbox('https://via.placeholder.com/1000x800?text=Kham+Trai+1', 'Bình khảm trai cao cấp')">
                <img src="../images/DanhSachSanPham/KhamMay/anh (1).jpg" alt="Khảm trai">
            </div>
            <div class="gallery-item" onclick="openLightbox('https://via.placeholder.com/1000x800?text=May+Tre+1', 'Giỏ mây tre đan thủ công')">
                <img src="../images/DanhSachSanPham/KhamMay/anh (2).jpg" alt="Mây tre">
            </div>
            <div class="gallery-item" onclick="openLightbox('https://via.placeholder.com/1000x800?text=Kham+Trai+2', 'Tranh khảm xà cừ cổ điển')">
                <img src="../images/DanhSachSanPham/KhamMay/anh (3).jpg" alt="Khảm trai">
            </div>
             <div class="gallery-item" onclick="openLightbox('https://via.placeholder.com/1000x800?text=May+Tre+2', 'Đèn mây tre trang trí')">
                <img src="../images/DanhSachSanPham/KhamMay/anh (4).jpg" alt="Mây tre">
            </div>
            </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img src="" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
    <div id="footer-container"></div>
    <script src="../js/global.js"></script>
    <script>
        // Tạo thêm ảnh giả lập để bạn thấy giao diện (trong thực tế bạn sẽ xóa đoạn này và tự điền HTML)
        const gallery = document.getElementById('gallery');
        for (let i = 5; i <= 69; i++) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            const type = i % 2 === 0 ? 'Khảm Trai' : 'Mây Tre';
            const imgSrc = `../images/DanhSachSanPham/KhamMay/anh (${i}).jpg`;
            const fullSrc = `../images/DanhSachSanPham/KhamMay/anh (${i}).jpg`;
            
            item.innerHTML = `<img src="${imgSrc}" alt="${type}">`;
            item.onclick = () => openLightbox(fullSrc, `Sản phẩm ${type} số ${i}`);
            gallery.appendChild(item);
        }

        // Chức năng Lightbox
        function openLightbox(src, caption) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            const lbCap = document.getElementById('lightbox-caption');
            
            lbImg.src = src;
            lbCap.innerText = caption;
            lb.classList.add('active');
            document.body.style.overflow = 'hidden'; // Khóa cuộn trang khi xem ảnh
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
